version: '3.9'
services:
  db:
    image: postgres:16-alpine
    container_name: stockpilot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: stockpilot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stockpilot-api
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/stockpilot?schema=public
    ports:
      - '4000:4000'

volumes:
  pgdata:
