version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: stockpilot-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stockpilot}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - stockpilot_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-stockpilot}']
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stockpilot-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - '${PORT:-4000}:4000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4000/${API_PREFIX:-api/v1}/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  stockpilot_pgdata:
