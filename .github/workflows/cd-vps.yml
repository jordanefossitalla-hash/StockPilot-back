name: CD to VPS

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - '.github/workflows/cd-vps.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 120s
          command_timeout: 60m
          script: |
            set -e

            APP_DIR="${{ secrets.VPS_APP_DIR }}"
            REPO_URL="https://github.com/jordanefossitalla-hash/StockPilot-back.git"

            mkdir -p "$(dirname "$APP_DIR")"
            if [ ! -d "$APP_DIR/.git" ]; then
              rm -rf "$APP_DIR"
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch --all
            git reset --hard origin/main

            if [ ! -f app/.env ]; then
              if [ -f app/.env.production.example ]; then
                cp app/.env.production.example app/.env
              elif [ -f app/.env.example ]; then
                cp app/.env.example app/.env
              else
                echo "Missing env template file (app/.env.production.example or app/.env.example)"
                exit 1
              fi
            fi

            docker compose -f app/docker-compose.prod.yml pull || true
            docker compose -f app/docker-compose.prod.yml up -d --build
            for i in {1..30}; do
              if docker compose -f app/docker-compose.prod.yml ps api | grep -q "Up"; then
                break
              fi
              sleep 2
            done
            docker compose -f app/docker-compose.prod.yml exec -T api npx prisma migrate deploy
            docker image prune -f
