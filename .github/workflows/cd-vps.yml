name: CD to VPS

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - '.github/workflows/cd-vps.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            APP_DIR="${{ secrets.VPS_APP_DIR }}"
            REPO_URL="https://github.com/jordanefossitalla-hash/StockPilot-back.git"

            mkdir -p "$(dirname "$APP_DIR")"
            if [ ! -d "$APP_DIR/.git" ]; then
              rm -rf "$APP_DIR"
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch --all
            git reset --hard origin/main

            docker compose -f app/docker-compose.prod.yml up -d --build
            docker compose -f app/docker-compose.prod.yml exec -T api npx prisma migrate deploy
            docker image prune -f
